<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mediator Sync Companion</title>
  <style>
    body {
      margin: 12px;
      font-family: Segoe UI, Arial, sans-serif;
      background: #10151f;
      color: #dce6f8;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    .row {
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      border: 1px solid #2a3447;
      border-radius: 6px;
      background: #0d1320;
      color: #dce6f8;
      padding: 8px;
      box-sizing: border-box;
      font-size: 12px;
      font-family: Consolas, "Courier New", monospace;
    }
    input[type="text"] {
      width: 100%;
      border: 1px solid #2a3447;
      border-radius: 6px;
      background: #0d1320;
      color: #dce6f8;
      padding: 8px;
      box-sizing: border-box;
      font-size: 12px;
    }
    button {
      border: 1px solid #35507a;
      background: #17233a;
      color: #dce6f8;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      margin-right: 6px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    button:hover {
      background: #213154;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #9db2d6;
    }
  </style>
</head>
<body>
  <h1>Mediator Sync Companion</h1>

  <div class="row">
    <input type="file" id="jsonFile" accept="application/json" />
  </div>

  <div class="row">
    <input type="text" id="endpoint" value="http://127.0.0.1:8080/figma-plugin" />
  </div>

  <div class="row">
    <button id="loadFile">Load JSON File</button>
    <button id="fetchEndpoint">Fetch Endpoint</button>
    <button id="apply">Apply to Canvas</button>
  </div>

  <div class="row">
    <textarea id="jsonText" spellcheck="false">{
  "textBindings": {
    "panel_backend_layers": "Updated backend summary",
    "panel_dashboard_activity_feed": "Last sync: 6:42 PM",
    "status_global_healthy": "Healthy"
  }
}</textarea>
  </div>

  <div class="status" id="status">Ready.</div>

  <script src="ui.js"></script>
</body>
</html>
